<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <filter id="shadow3" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2D3748" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="headerGrad3" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#1E5A9A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" rx="16" fill="#FFFFFF"/>

  <!-- Header -->
  <rect width="800" height="120" rx="16" fill="url(#headerGrad3)"/>
  <rect y="104" width="800" height="16" fill="url(#headerGrad3)"/>
  <circle cx="730" cy="30" r="40" fill="#FFFFFF" opacity="0.05"/>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="27" fill="#FFFFFF">Telehealth ADHD Treatment</text>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="22" fill="#F6C744">Benefits vs. Limitations</text>

  <!-- LEFT COLUMN: Benefits -->
  <rect x="30" y="145" rx="14" width="360" height="688" fill="#F0FFF4" stroke="#C6F6D5" stroke-width="1.5" filter="url(#shadow3)"/>

  <!-- Benefits header -->
  <rect x="30" y="145" rx="14" width="360" height="55" fill="#38A169"/>
  <rect x="30" y="182" width="360" height="18" fill="#38A169"/>
  <!-- Checkmark icon in header -->
  <circle cx="72" cy="172" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="72" y="179" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF">&#10003;</text>
  <text x="100" y="180" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#FFFFFF">Benefits</text>

  <!-- Benefit items -->
  <!-- Item 1 -->
  <g transform="translate(50, 225)">
    <circle cx="16" cy="12" r="14" fill="#38A169" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#38A169">&#10003;</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">No Commute or Waiting Room</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">See your provider from the comfort of home.</text>
  </g>

  <!-- Item 2 -->
  <g transform="translate(50, 305)">
    <circle cx="16" cy="12" r="14" fill="#38A169" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#38A169">&#10003;</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Fits Busy Schedules</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Flexible appointments including evenings.</text>
  </g>

  <!-- Item 3 -->
  <g transform="translate(50, 385)">
    <circle cx="16" cy="12" r="14" fill="#38A169" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#38A169">&#10003;</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Statewide Access in Florida</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Connect from any city or rural area in FL.</text>
  </g>

  <!-- Item 4 -->
  <g transform="translate(50, 465)">
    <circle cx="16" cy="12" r="14" fill="#38A169" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#38A169">&#10003;</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Better Medication Adherence</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Easier follow-ups mean more consistent care.</text>
  </g>

  <!-- Item 5 -->
  <g transform="translate(50, 545)">
    <circle cx="16" cy="12" r="14" fill="#38A169" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#38A169">&#10003;</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Reduced Stigma</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Private, discreet care in your own space.</text>
  </g>

  <!-- Item 6 -->
  <g transform="translate(50, 625)">
    <circle cx="16" cy="12" r="14" fill="#38A169" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#38A169">&#10003;</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Same Quality of Care</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Evidence shows equivalent clinical outcomes.</text>
  </g>

  <!-- RIGHT COLUMN: Limitations -->
  <rect x="410" y="145" rx="14" width="360" height="688" fill="#FFFAF0" stroke="#FEEBC8" stroke-width="1.5" filter="url(#shadow3)"/>

  <!-- Limitations header -->
  <rect x="410" y="145" rx="14" width="360" height="55" fill="#D69E2E"/>
  <rect x="410" y="182" width="360" height="18" fill="#D69E2E"/>
  <!-- Caution icon -->
  <circle cx="452" cy="172" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="452" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="18" fill="#FFFFFF">!</text>
  <text x="480" y="180" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="20" fill="#FFFFFF">Limitations</text>

  <!-- Limitation items -->
  <!-- Item 1 -->
  <g transform="translate(430, 225)">
    <circle cx="16" cy="12" r="14" fill="#D69E2E" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="15" fill="#D69E2E">!</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Requires Stable Internet</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Reliable broadband needed for video calls.</text>
  </g>

  <!-- Item 2 -->
  <g transform="translate(430, 305)">
    <circle cx="16" cy="12" r="14" fill="#D69E2E" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="15" fill="#D69E2E">!</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Not for Physical Exams</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Lab work or vitals require in-person visit.</text>
  </g>

  <!-- Item 3 -->
  <g transform="translate(430, 385)">
    <circle cx="16" cy="12" r="14" fill="#D69E2E" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="15" fill="#D69E2E">!</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Some Prefer In-Person</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Personal preference varies by individual.</text>
  </g>

  <!-- Item 4 -->
  <g transform="translate(430, 465)">
    <circle cx="16" cy="12" r="14" fill="#D69E2E" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="15" fill="#D69E2E">!</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Tech Disruptions Possible</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">Audio/video glitches can occasionally occur.</text>
  </g>

  <!-- Item 5 -->
  <g transform="translate(430, 545)">
    <circle cx="16" cy="12" r="14" fill="#D69E2E" opacity="0.15"/>
    <text x="16" y="18" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="15" fill="#D69E2E">!</text>
    <text x="42" y="10" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#2D3748">Video Required for Initial Rx</text>
    <text x="42" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">First prescription needs video evaluation,</text>
    <text x="42" y="48" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">not audio-only.</text>
  </g>

  <!-- Bottom note -->
  <rect x="430" y="640" rx="10" width="320" height="48" fill="#2B6CB0" opacity="0.06"/>
  <text x="590" y="662" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="13" fill="#2B6CB0">Most limitations are easily managed</text>
  <text x="590" y="680" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="13" fill="#2B6CB0">with basic preparation.</text>

  <!-- Footer -->
  <rect x="0" y="850" width="800" height="50" fill="#2B6CB0"/>
  <rect x="0" y="850" width="800" height="4" fill="#F6C744"/>
  <text x="400" y="882" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#FFFFFF">Refresh Psychiatry</text>
</svg>