<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7FAFC;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2B6CB0" flood-opacity="0.12"/>
    </filter>
    <filter id="arrowGlow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#F6C744" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="60" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="32" font-weight="700" fill="#2D3748" text-anchor="middle">The Box Breathing Technique</text>
  <text x="600" y="90" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="16" fill="#2D3748" text-anchor="middle" opacity="0.6">Follow the 4 steps in a square pattern - 4 seconds each</text>

  <!-- Central square path (the "box") -->
  <rect x="400" y="160" width="400" height="350" rx="20" fill="none" stroke="#2B6CB0" stroke-width="3" stroke-dasharray="12,6" opacity="0.2"/>

  <!-- Step 1: INHALE (Top) -->
  <rect x="460" y="120" width="280" height="70" rx="16" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#2B6CB0" stroke-width="2"/>
  <circle cx="490" cy="155" r="18" fill="#2B6CB0"/>
  <text x="490" y="161" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="530" y="148" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#2B6CB0">INHALE</text>
  <text x="530" y="172" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="14" fill="#2D3748" opacity="0.7">Breathe in slowly for 4 seconds</text>

  <!-- Step 2: HOLD (Right) -->
  <rect x="830" y="280" width="280" height="70" rx="16" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#F6C744" stroke-width="2"/>
  <circle cx="860" cy="315" r="18" fill="#F6C744"/>
  <text x="860" y="321" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
  <text x="900" y="308" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#D4A017">HOLD</text>
  <text x="900" y="332" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="14" fill="#2D3748" opacity="0.7">Keep lungs full for 4 seconds</text>

  <!-- Step 3: EXHALE (Bottom) -->
  <rect x="460" y="440" width="280" height="70" rx="16" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#2B6CB0" stroke-width="2"/>
  <circle cx="490" cy="475" r="18" fill="#2B6CB0"/>
  <text x="490" y="481" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="530" y="468" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#2B6CB0">EXHALE</text>
  <text x="530" y="492" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="14" fill="#2D3748" opacity="0.7">Release breath slowly for 4 seconds</text>

  <!-- Step 4: HOLD (Left) -->
  <rect x="90" y="280" width="280" height="70" rx="16" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#F6C744" stroke-width="2"/>
  <circle cx="120" cy="315" r="18" fill="#F6C744"/>
  <text x="120" y="321" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">4</text>
  <text x="160" y="308" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="18" font-weight="700" fill="#D4A017">HOLD</text>
  <text x="160" y="332" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="14" fill="#2D3748" opacity="0.7">Keep lungs empty for 4 seconds</text>

  <!-- Arrows connecting the steps (clockwise) -->
  <!-- Arrow 1→2: Top-right corner -->
  <path d="M740 155 Q800 155 800 210 Q800 270 800 290" fill="none" stroke="#F6C744" stroke-width="3" filter="url(#arrowGlow)" stroke-linecap="round"/>
  <polygon points="800,295 793,280 807,280" fill="#F6C744"/>

  <!-- Arrow 2→3: Bottom-right corner -->
  <path d="M830 315 Q810 315 800 350 Q790 420 740 470" fill="none" stroke="#F6C744" stroke-width="3" filter="url(#arrowGlow)" stroke-linecap="round"/>
  <polygon points="737,472 750,462 745,478" fill="#F6C744"/>

  <!-- Arrow 3→4: Bottom-left corner -->
  <path d="M460 475 Q410 475 400 430 Q390 370 380 315" fill="none" stroke="#F6C744" stroke-width="3" filter="url(#arrowGlow)" stroke-linecap="round"/>
  <polygon points="378,312 371,327 385,327" fill="#F6C744"/>

  <!-- Arrow 4→1: Top-left corner -->
  <path d="M370 290 Q370 220 400 180 Q430 155 460 155" fill="none" stroke="#F6C744" stroke-width="3" filter="url(#arrowGlow)" stroke-linecap="round"/>
  <polygon points="463,155 448,148 448,162" fill="#F6C744"/>

  <!-- Center text -->
  <text x="600" y="320" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="40" font-weight="800" fill="#2B6CB0" text-anchor="middle" opacity="0.12">4×4</text>

  <!-- Bottom bar -->
  <rect x="0" y="570" width="1200" height="58" fill="#2B6CB0" opacity="0.05"/>
  <text x="600" y="600" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="13" fill="#2B6CB0" text-anchor="middle" font-weight="600">REFRESH PSYCHIATRY &amp; THERAPY  |  refreshpsychiatry.com  |  (954) 603-4081</text>
  <text x="600" y="620" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="11" fill="#2D3748" text-anchor="middle" opacity="0.5">Repeat 3-4 cycles for maximum benefit</text>
</svg>