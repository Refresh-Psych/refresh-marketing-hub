<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <filter id="shadow2" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2D3748" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="headerGrad2" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#1E5A9A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="900" rx="16" fill="#FFFFFF"/>

  <!-- Header -->
  <rect width="800" height="130" rx="16" fill="url(#headerGrad2)"/>
  <rect y="114" width="800" height="16" fill="url(#headerGrad2)"/>
  <circle cx="740" cy="35" r="45" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="55" cy="95" r="30" fill="#FFFFFF" opacity="0.04"/>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="27" fill="#FFFFFF">ADHD Medications Available</text>
  <text x="400" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="27" fill="#FFFFFF">Through Telehealth</text>
  <text x="400" y="120" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#F6C744" letter-spacing="1.5">PRESCRIBED BY BOARD-CERTIFIED PSYCHIATRISTS</text>

  <!-- LEFT COLUMN: Stimulants -->
  <rect x="35" y="155" rx="14" width="355" height="670" fill="#F7FAFD" stroke="#D6E4F0" stroke-width="1.5" filter="url(#shadow2)"/>

  <!-- Left column header -->
  <rect x="35" y="155" rx="14" width="355" height="58" fill="#2B6CB0"/>
  <rect x="35" y="195" width="355" height="18" fill="#2B6CB0"/>
  <text x="212" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="19" fill="#FFFFFF">Stimulants (Schedule II)</text>

  <!-- Methylphenidate subgroup -->
  <rect x="55" y="232" rx="8" width="315" height="32" fill="#2B6CB0" opacity="0.10"/>
  <text x="212" y="254" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="15" fill="#2B6CB0">Methylphenidate-Based</text>

  <!-- Medication pills -->
  <rect x="65" y="278" rx="20" width="130" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="130" y="301" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Ritalin</text>

  <rect x="205" y="278" rx="20" width="155" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="282" y="301" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Concerta</text>

  <rect x="65" y="326" rx="20" width="130" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="130" y="349" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Focalin</text>

  <rect x="205" y="326" rx="20" width="155" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="282" y="349" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Jornay PM</text>

  <!-- Amphetamine subgroup -->
  <rect x="55" y="386" rx="8" width="315" height="32" fill="#2B6CB0" opacity="0.10"/>
  <text x="212" y="408" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="15" fill="#2B6CB0">Amphetamine-Based</text>

  <rect x="65" y="432" rx="20" width="130" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="130" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Adderall</text>

  <rect x="205" y="432" rx="20" width="155" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="282" y="455" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Vyvanse</text>

  <rect x="65" y="480" rx="20" width="140" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="135" y="503" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Dexedrine</text>

  <rect x="215" y="480" rx="20" width="145" height="36" fill="#FFFFFF" stroke="#2B6CB0" stroke-width="1.5"/>
  <text x="287" y="503" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="14" fill="#2B6CB0">Mydayis</text>

  <!-- APA Note -->
  <rect x="55" y="545" rx="10" width="315" height="50" fill="#F6C744" opacity="0.20"/>
  <rect x="55" y="545" rx="10" width="5" height="50" fill="#F6C744"/>
  <text x="75" y="568" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#2D3748">APA Guideline:</text>
  <text x="185" y="568" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#2D3748">First-line treatment</text>
  <text x="75" y="586" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#2D3748">for adult ADHD per current evidence.</text>

  <!-- Note about 30-day supply -->
  <text x="212" y="625" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#718096">Prescribed as 30-day supply</text>
  <text x="212" y="642" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#718096">No refills — new Rx each month</text>

  <!-- RIGHT COLUMN: Non-Stimulants -->
  <rect x="410" y="155" rx="14" width="355" height="670" fill="#FFFCF5" stroke="#F0E4C8" stroke-width="1.5" filter="url(#shadow2)"/>

  <!-- Right column header -->
  <rect x="410" y="155" rx="14" width="355" height="58" fill="#D69E2E"/>
  <rect x="410" y="195" width="355" height="18" fill="#D69E2E"/>
  <text x="587" y="192" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="19" fill="#FFFFFF">Non-Stimulants</text>

  <!-- Non-stim medication cards -->
  <rect x="430" y="235" rx="12" width="315" height="80" fill="#FFFFFF" stroke="#F0E4C8" stroke-width="1.2" filter="url(#shadow2)"/>
  <text x="450" y="262" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="17" fill="#2D3748">Strattera</text>
  <text x="450" y="283" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">atomoxetine</text>
  <text x="450" y="303" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#2D3748">SNRI — non-controlled substance</text>

  <rect x="430" y="330" rx="12" width="315" height="80" fill="#FFFFFF" stroke="#F0E4C8" stroke-width="1.2" filter="url(#shadow2)"/>
  <text x="450" y="357" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="17" fill="#2D3748">Qelbree</text>
  <text x="450" y="378" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">viloxazine</text>
  <text x="450" y="398" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#2D3748">FDA-approved for adult ADHD</text>

  <rect x="430" y="425" rx="12" width="315" height="80" fill="#FFFFFF" stroke="#F0E4C8" stroke-width="1.2" filter="url(#shadow2)"/>
  <text x="450" y="452" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="17" fill="#2D3748">Intuniv</text>
  <text x="450" y="473" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">guanfacine ER</text>
  <text x="450" y="493" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#2D3748">Alpha-2 agonist — helps focus &amp; impulsivity</text>

  <rect x="430" y="520" rx="12" width="315" height="80" fill="#FFFFFF" stroke="#F0E4C8" stroke-width="1.2" filter="url(#shadow2)"/>
  <text x="450" y="547" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="17" fill="#2D3748">Kapvay</text>
  <text x="450" y="568" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#718096">clonidine ER</text>
  <text x="450" y="588" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="12" fill="#2D3748">Alpha-2 agonist — may help with hyperactivity</text>

  <!-- Non-stim note -->
  <rect x="430" y="625" rx="10" width="315" height="50" fill="#F6C744" opacity="0.15"/>
  <rect x="430" y="625" rx="10" width="5" height="50" fill="#F6C744"/>
  <text x="450" y="648" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="13" fill="#2D3748">Good option when:</text>
  <text x="563" y="648" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#2D3748">stimulants aren't</text>
  <text x="450" y="666" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="13" fill="#2D3748">tolerated, or history of substance use.</text>

  <!-- Footer -->
  <rect x="0" y="850" width="800" height="50" fill="#2B6CB0"/>
  <rect x="0" y="850" width="800" height="4" fill="#F6C744"/>
  <text x="400" y="882" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="16" fill="#FFFFFF">Refresh Psychiatry</text>
</svg>