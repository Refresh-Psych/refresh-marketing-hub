<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EBF4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2B6CB0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A4F8B;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2B6CB0" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bgGrad)" rx="0"/>

  <!-- Subtle decorative circles -->
  <circle cx="100" cy="100" r="180" fill="#2B6CB0" opacity="0.03"/>
  <circle cx="1100" cy="528" r="220" fill="#2B6CB0" opacity="0.03"/>
  <circle cx="900" cy="80" r="120" fill="#F6C744" opacity="0.05"/>

  <!-- Breathing rings animation-like design -->
  <circle cx="350" cy="314" r="200" fill="none" stroke="#2B6CB0" stroke-width="1" opacity="0.08"/>
  <circle cx="350" cy="314" r="170" fill="none" stroke="#2B6CB0" stroke-width="1.5" opacity="0.12"/>
  <circle cx="350" cy="314" r="140" fill="none" stroke="#2B6CB0" stroke-width="2" opacity="0.18"/>
  <circle cx="350" cy="314" r="110" fill="none" stroke="#2B6CB0" stroke-width="2.5" opacity="0.25"/>
  <circle cx="350" cy="314" r="80" fill="none" stroke="#2B6CB0" stroke-width="3" opacity="0.35"/>

  <!-- Person silhouette (meditation pose) -->
  <!-- Head -->
  <circle cx="350" cy="260" r="30" fill="url(#blueGrad)" filter="url(#softShadow)"/>
  <!-- Body -->
  <path d="M350 290 Q350 320 350 350 Q330 370 300 380 Q280 385 270 390" fill="none" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round"/>
  <path d="M350 290 Q350 320 350 350 Q370 370 400 380 Q420 385 430 390" fill="none" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round"/>
  <!-- Legs crossed -->
  <path d="M320 360 Q290 380 270 370 Q260 365 270 355" fill="none" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round"/>
  <path d="M380 360 Q410 380 430 370 Q440 365 430 355" fill="none" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round"/>

  <!-- Breath visualization - flowing curves -->
  <path d="M310 280 Q280 260 290 230 Q300 200 320 210" fill="none" stroke="#F6C744" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M390 280 Q420 260 410 230 Q400 200 380 210" fill="none" stroke="#F6C744" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <path d="M330 250 Q340 220 350 200" fill="none" stroke="#F6C744" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M370 250 Q360 220 350 200" fill="none" stroke="#F6C744" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>

  <!-- Small floating dots -->
  <circle cx="300" cy="200" r="3" fill="#F6C744" opacity="0.6"/>
  <circle cx="400" cy="190" r="2.5" fill="#F6C744" opacity="0.5"/>
  <circle cx="350" cy="170" r="4" fill="#F6C744" opacity="0.4"/>
  <circle cx="320" cy="185" r="2" fill="#2B6CB0" opacity="0.4"/>
  <circle cx="380" cy="175" r="2" fill="#2B6CB0" opacity="0.3"/>

  <!-- Text content area -->
  <text x="620" y="220" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="48" font-weight="700" fill="#2D3748" letter-spacing="-0.5">Box Breathing</text>
  <text x="620" y="275" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="48" font-weight="700" fill="#2B6CB0" letter-spacing="-0.5">in 30 Seconds</text>

  <!-- Divider line -->
  <rect x="620" y="300" width="80" height="4" rx="2" fill="#F6C744"/>

  <text x="620" y="345" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="20" fill="#2D3748" opacity="0.7">A Psychiatrist's Guide</text>
  <text x="620" y="375" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="20" fill="#2D3748" opacity="0.7">to Instant Calm</text>

  <!-- 4-4-4-4 badge -->
  <rect x="620" y="405" width="200" height="50" rx="25" fill="#2B6CB0" filter="url(#softShadow)"/>
  <text x="720" y="437" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" text-anchor="middle">4 - 4 - 4 - 4</text>

  <!-- Brand footer -->
  <rect x="620" y="490" width="400" height="1" fill="#2B6CB0" opacity="0.15"/>
  <text x="620" y="520" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="14" fill="#2B6CB0" font-weight="600">REFRESH PSYCHIATRY &amp; THERAPY</text>
  <text x="620" y="545" font-family="Montserrat, Poppins, 'DM Sans', Arial, sans-serif" font-size="13" fill="#2D3748" opacity="0.5">refreshpsychiatry.com | (954) 603-4081</text>
</svg>