      "name": "What is pharmacogenomic testing?",
      "acceptedAnswer": {
        "@type": "Answer",

    },

      "name": "What is the cost of an appointment without insurance?",

      "name": "How often will I need follow-up appointments?",

    },

      "@type": "Question",

    },

      "@type": "Question",
      "name": "What is your cancellation policy?",

        "@type": "Answer",

      }
    },

      "@type": "Question",
      "name": "Are your providers board-certified?",

        "@type": "Answer",

      }
    },
    {
      "@type": "Question",
      "name": "Can I switch providers within Refresh Psychiatry?",
      "acceptedAnswer": {
        "@type": "Answer",

    },
    {
      "@type": "Question",
      "name": "Do you prescribe controlled substances?",
      "acceptedAnswer": {
        "@type": "Answer",

    },
    {

      "name": "How do I know if I need a psychiatrist vs. a therapist?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "If you think you may benefit from medication for a mental health condition, or if therapy alone hasn't been sufficient, seeing a psychiatrist is a good next step. If you're primarily looking for talk therapy or coping strategies, a therapist may be the right starting point. Our team can help you determine the best approach during your initial consultation."
      }
    },
    {
      "@type": "Question",
      "name": "Is my information kept confidential?",
      "acceptedAnswer": {
        "@type": "Answer",
