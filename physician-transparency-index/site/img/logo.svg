<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Main blue circle -->
  <circle cx="60" cy="60" r="50" fill="#2B6CB0"/>

  <!-- Pill capsule -->
  <g transform="translate(60, 60) rotate(-45)">
    <!-- Yellow half (top) -->
    <rect x="-10" y="-30" width="20" height="30" rx="0" fill="#F6C744"/>
    <rect x="-10" y="-30" width="20" height="10" rx="10" fill="#F6C744"/>
    <!-- White half (bottom) -->
    <rect x="-10" y="0" width="20" height="30" rx="0" fill="#FFFFFF"/>
    <rect x="-10" y="20" width="20" height="10" rx="10" fill="#FFFFFF"/>
  </g>

  <!-- Dollar sign badge (top-right) -->
  <circle cx="95" cy="25" r="16" fill="#F6C744" stroke="#FFFFFF" stroke-width="3"/>
  <text x="95" y="31" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-weight="700" font-size="18" fill="#2D3748">$</text>

  <!-- Warning badge (bottom-left) -->
  <circle cx="25" cy="95" r="16" fill="#F6C744" stroke="#FFFFFF" stroke-width="3"/>
  <text x="25" y="101" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-weight="700" font-size="18" fill="#2D3748">!</text>
</svg>
